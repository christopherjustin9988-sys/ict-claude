<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICT Strategy</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080c14;--surface:#0d1424;--border:#1e293b;
  --cyan:#00e5ff;--purple:#a78bfa;--green:#4ade80;
  --red:#f87171;--orange:#ff6b35;--yellow:#fbbf24;--blue:#60a5fa;
  --text:#e2e8f0;--muted:#64748b;--sub:#94a3b8;
}
body{background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;min-height:100vh;overflow-x:hidden}
/* HEADER */
.header{background:linear-gradient(135deg,#0d1424,#111827);border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--purple));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:bold;color:#000}
.logo-text{font-size:16px;font-weight:bold;letter-spacing:2px;color:var(--cyan)}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:3px}
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 11px;border:none;cursor:pointer;background:transparent;font-size:9px;letter-spacing:1px;font-family:inherit;font-weight:bold;white-space:nowrap;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
/* CONTENT */
.page{display:none;padding:18px 16px;max-width:800px;margin:0 auto}
.page.active{display:block}
.section-label{font-size:9px;color:var(--muted);letter-spacing:3px;margin-bottom:14px}
/* CONCEPTS */
.concepts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.concept-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px;cursor:pointer;transition:all .2s;text-align:left}
.concept-card:hover,.concept-card.active{border-color:var(--card-color,var(--cyan));background:color-mix(in srgb,var(--card-color,var(--cyan)) 8%,transparent)}
.concept-icon{font-size:22px;margin-bottom:6px}
.concept-name{font-size:10px;font-weight:bold;letter-spacing:1px;margin-bottom:3px}
.concept-desc{font-size:9px;color:var(--muted);line-height:1.4}
.concept-detail{margin-top:14px;background:var(--surface);border-radius:12px;padding:18px;border-left:3px solid var(--card-color,var(--cyan));display:none}
.concept-detail.active{display:block}
.detail-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.detail-title{font-size:13px;font-weight:bold}
.detail-sub{font-size:11px;color:var(--sub);margin-top:2px}
.rule{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:var(--bg);border-radius:8px;font-size:11px;margin-bottom:6px}
.rule-arrow{flex-shrink:0;margin-top:1px}
/* PATTERNS */
.filter-row{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.filter-btn{padding:4px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:9px;font-family:inherit;font-weight:bold;letter-spacing:1px;cursor:pointer;transition:all .2s}
.filter-btn.active{border-color:var(--cyan);background:rgba(0,229,255,.1);color:var(--cyan)}
.patterns-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.pattern-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s}
.pattern-card:hover,.pattern-card.active{border-color:var(--card-color,var(--cyan))}
.pattern-chart{padding:10px 10px 4px;background:var(--bg)}
.pattern-chart svg{width:100%;height:110px}
.pattern-info{padding:10px 13px 12px}
.pattern-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.pattern-name{font-size:10px;font-weight:bold}
.pattern-tag{font-size:7px;padding:2px 6px;border-radius:10px;letter-spacing:1px}
.pattern-desc{font-size:9px;color:var(--muted);line-height:1.5}
.pattern-tfs{display:flex;gap:4px;margin-top:7px;flex-wrap:wrap}
.tf-badge{font-size:7px;padding:2px 6px;background:var(--border);color:var(--muted);border-radius:4px}
.pattern-detail{margin-top:14px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:none}
.pattern-detail.active{display:block}
.how-to-trade{background:var(--bg);border-radius:10px;padding:13px;border-left:3px solid var(--cyan);margin-top:10px}
.how-label{font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:6px}
.how-text{font-size:11px;color:var(--sub);line-height:1.7}
/* CHECKLIST */
.checklist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.check-count{font-size:12px;font-weight:bold}
.reset-btn{background:var(--border);border:none;color:var(--muted);font-size:9px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:inherit;letter-spacing:1px}
.progress-bar{background:var(--border);border-radius:999px;height:4px;margin-bottom:14px;overflow:hidden}
.progress-fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--cyan),var(--purple));transition:width .3s ease}
.progress-fill.complete{background:var(--green)}
.check-item{display:flex;align-items:center;gap:12px;padding:11px 13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;margin-bottom:6px;user-select:none}
.check-item.checked{background:#0d2b1a;border-color:rgba(34,197,94,.3)}
.checkbox{width:18px;height:18px;border-radius:4px;border:2px solid #334155;background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;color:#000;transition:all .2s;flex-shrink:0}
.check-item.checked .checkbox{border-color:var(--green);background:var(--green)}
.check-label{font-size:11px;color:var(--sub);transition:all .2s}
.check-item.checked .check-label{color:#86efac;text-decoration:line-through}
.ready-banner{margin-top:14px;padding:16px;background:#0d2b1a;border:1px solid var(--green);border-radius:12px;text-align:center;display:none}
.ready-banner.show{display:block}
.ready-banner-text{color:var(--green);font-weight:bold;letter-spacing:2px;font-size:11px;margin-top:6px}
/* BIAS */
.bias-item{padding:13px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;transition:all .2s}
.bias-item.yes{border-color:rgba(74,222,128,.3)}
.bias-item.no{border-color:rgba(248,113,113,.3)}
.bias-q{font-size:11px;color:var(--text);margin-bottom:10px;line-height:1.5}
.bias-btns{display:flex;gap:6px}
.bias-btn{padding:5px 16px;border-radius:6px;border:1px solid #334155;background:transparent;color:var(--muted);font-size:9px;font-family:inherit;font-weight:bold;letter-spacing:2px;cursor:pointer;transition:all .15s}
.bias-btn.yes-active{border-color:var(--green);background:#14532d;color:var(--green)}
.bias-btn.no-active{border-color:var(--red);background:#450a0a;color:var(--red)}
.clr-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:#334155;font-size:8px;font-family:inherit;cursor:pointer;letter-spacing:1px}
.bias-result{margin-top:16px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:12px;text-align:center}
.bias-result-label{font-size:9px;color:var(--muted);letter-spacing:3px;margin-bottom:6px}
.bias-result-value{font-size:22px;font-weight:bold}
.bias-result-sub{font-size:10px;color:var(--muted);margin-top:6px}
/* JOURNAL */
.journal-form{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.form-field label{display:block;font-size:8px;color:var(--muted);letter-spacing:2px;margin-bottom:3px}
.form-field input,.form-field select,.form-field textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:8px;font-size:11px;font-family:inherit}
.form-field textarea{resize:vertical}
.form-field select option{background:var(--surface)}
.log-btn{background:linear-gradient(135deg,rgba(0,229,255,.15),rgba(167,139,250,.15));border:1px solid rgba(0,229,255,.3);color:var(--cyan);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:9px;font-family:inherit;font-weight:bold;letter-spacing:2px;margin-top:8px}
.no-trades{text-align:center;padding:40px;color:#334155;font-size:10px;letter-spacing:2px}
.trade-entry{display:flex;justify-content:space-between;align-items:center;padding:11px 13px;background:var(--surface);border-radius:10px;margin-bottom:6px;border:1px solid var(--border)}
.trade-entry.win{border-color:rgba(34,197,94,.2)}
.trade-entry.loss{border-color:rgba(239,68,68,.2)}
.trade-left{display:flex;gap:12px;align-items:center}
.trade-pair{font-weight:bold;color:var(--cyan);font-size:12px}
.trade-bias{font-size:10px}
.trade-rr{font-size:10px;color:var(--sub)}
.trade-right{display:flex;gap:10px;align-items:center}
.trade-date{font-size:9px;color:var(--muted)}
.trade-result{font-size:9px;font-weight:bold;padding:2px 8px;border-radius:20px}
.trade-result.win{background:#14532d;color:var(--green)}
.trade-result.loss{background:#450a0a;color:var(--red)}
.trade-result.breakeven{background:var(--border);color:var(--sub)}
/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page.active{animation:fadeUp .25s ease}
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">&#9672;</div>
    <div>
      <div class="logo-text">ICT STRATEGY</div>
      <div class="logo-sub">INNER CIRCLE TRADER</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('concepts',this)">&#128218; CONCEPTS</button>
    <button class="tab" onclick="showTab('patterns',this)">&#128200; PATTERNS</button>
    <button class="tab" onclick="showTab('checklist',this)">&#9989; CHECKLIST</button>
    <button class="tab" onclick="showTab('bias',this)">&#129517; BIAS</button>
    <button class="tab" onclick="showTab('journal',this)">&#128211; JOURNAL</button>
  </div>
</div>

<!-- CONCEPTS -->
<div class="page active" id="page-concepts">
  <div class="section-label">SELECT A CONCEPT TO STUDY</div>
  <div class="concepts-grid" id="concepts-grid"></div>
  <div class="concept-detail" id="concept-detail"></div>
</div>

<!-- PATTERNS -->
<div class="page" id="page-patterns">
  <div class="section-label">CHART PATTERN VISUAL GUIDE</div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterPatterns('all',this)">ALL</button>
    <button class="filter-btn" onclick="filterPatterns('bullish',this)">BULLISH</button>
    <button class="filter-btn" onclick="filterPatterns('bearish',this)">BEARISH</button>
    <button class="filter-btn" onclick="filterPatterns('neutral',this)">NEUTRAL</button>
  </div>
  <div class="patterns-grid" id="patterns-grid"></div>
  <div class="pattern-detail" id="pattern-detail"></div>
</div>

<!-- CHECKLIST -->
<div class="page" id="page-checklist">
  <div class="checklist-header">
    <div class="section-label" style="margin:0">PRE-TRADE CHECKLIST</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="check-count" id="check-count" style="color:var(--yellow)">0/11</span>
      <button class="reset-btn" onclick="resetChecks()">RESET</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="checklist-items"></div>
  <div class="ready-banner" id="ready-banner">
    <div style="font-size:20px">&#9989;</div>
    <div class="ready-banner-text">SETUP CONFIRMED — EXECUTE WITH DISCIPLINE</div>
  </div>
</div>

<!-- BIAS -->
<div class="page" id="page-bias">
  <div class="section-label">DAILY BIAS CHECKER</div>
  <div id="bias-questions"></div>
  <div class="bias-result" id="bias-result">
    <div class="bias-result-label">TODAY'S BIAS</div>
    <div class="bias-result-value" id="bias-value" style="color:var(--sub)">NEUTRAL &#9898;</div>
    <div class="bias-result-sub" id="bias-sub">Bull: 0 / Bear: 0</div>
  </div>
</div>

<!-- JOURNAL -->
<div class="page" id="page-journal">
  <div class="section-label">TRADE JOURNAL</div>
  <div class="journal-form">
    <div class="section-label" style="margin-bottom:10px">LOG NEW TRADE</div>
    <div class="form-grid">
      <div class="form-field"><label>PAIR</label><input id="j-pair" placeholder="EURUSD"/></div>
      <div class="form-field"><label>R:R</label><input id="j-rr" placeholder="1:3"/></div>
      <div class="form-field"><label>BIAS</label>
        <select id="j-bias"><option>Bullish</option><option>Bearish</option></select>
      </div>
      <div class="form-field"><label>RESULT</label>
        <select id="j-result"><option>Win</option><option>Loss</option><option>Breakeven</option></select>
      </div>
    </div>
    <div class="form-field"><label>NOTES</label><textarea id="j-notes" rows="2" placeholder="Setup description, what went right/wrong..."></textarea></div>
    <button class="log-btn" onclick="logTrade()">+ LOG TRADE</button>
  </div>
  <div id="journal-entries"><div class="no-trades">NO TRADES LOGGED YET</div></div>
</div>

  'Is HTF (Daily/Weekly) trending up?',

// ===== STATE =====
let activeConceptId = null;
let activePatternId = null;
let checks = new Array(checklistItems.length).fill(false);
let biasAnswers = new Array(biasQs.length).fill(null);
let trades = [];
let patternFilter = 'all';

// ===== TABS =====
function showTab(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}

// ===== CONCEPTS =====
function renderConcepts() {
  const grid = document.getElementById('concepts-grid');
  grid.innerHTML = concepts.map(c => `
    <div class="concept-card ${activeConceptId===c.id?'active':''}" 
         style="--card-color:${c.color}" onclick="selectConcept('${c.id}')">
      <div class="concept-icon">${c.icon}</div>
      <div class="concept-name" style="color:${c.color}">${c.label}</div>
      <div class="concept-desc">${c.desc.slice(0,50)}...</div>
    </div>`).join('');
  
  const detail = document.getElementById('concept-detail');
  if(activeConceptId) {
    const c = concepts.find(x=>x.id===activeConceptId);
    detail.style.setProperty('--card-color',c.color);
    detail.innerHTML = `
      <div class="detail-header">
        <span style="font-size:26px">${c.icon}</span>
        <div>
          <div class="detail-title" style="color:${c.color}">${c.label}</div>
          <div class="detail-sub">${c.desc}</div>
        </div>
      </div>
      ${c.rules.map(r=>`<div class="rule"><span class="rule-arrow" style="color:${c.color}">&#9658;</span><span style="color:#cbd5e1">${r}</span></div>`).join('')}`;
    detail.classList.add('active');
  } else {
    detail.classList.remove('active');
  }
}

function selectConcept(id) {
  activeConceptId = activeConceptId===id ? null : id;
  renderConcepts();
  if(activeConceptId) document.getElementById('concept-detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ===== PATTERNS =====
function renderPatterns() {
  const grid = document.getElementById('patterns-grid');
  const filtered = patterns.filter(p => patternFilter==='all' || p.type===patternFilter);
  grid.innerHTML = filtered.map(p => `
    <div class="pattern-card ${activePatternId===p.id?'active':''}" 
         style="--card-color:${p.color}" onclick="selectPattern('${p.id}')">
      <div class="pattern-chart">${p.svg}</div>
      <div class="pattern-info">
        <div class="pattern-header">
          <div class="pattern-name" style="color:${p.color}">${p.name}</div>
          <div class="pattern-tag" style="background:${p.color}20;color:${p.color}">${p.tag}</div>
        </div>
        <div class="pattern-desc">${p.desc.slice(0,70)}...</div>
        <div class="pattern-tfs">${p.tfs.map(t=>`<span class="tf-badge">${t}</span>`).join('')}</div>
      </div>
    </div>`).join('');

  const detail = document.getElementById('pattern-detail');
  if(activePatternId) {
    const p = patterns.find(x=>x.id===activePatternId);
    detail.innerHTML = `
      <div class="detail-title" style="color:${p.color};margin-bottom:8px">${p.name}</div>
      <div style="font-size:11px;color:var(--sub);line-height:1.6;margin-bottom:12px">${p.desc}</div>
      <div class="how-to-trade">
        <div class="how-label">HOW TO TRADE</div>
        <div class="how-text">${p.how}</div>
      </div>`;
    detail.classList.add('active');
  } else {
    detail.classList.remove('active');
  }
}

function selectPattern(id) {
  activePatternId = activePatternId===id ? null : id;
  renderPatterns();
  if(activePatternId) document.getElementById('pattern-detail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function filterPatterns(f, btn) {
  patternFilter = f;
  activePatternId = null;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderPatterns();
}

// ===== CHECKLIST =====
function renderChecklist() {
  const container = document.getElementById('checklist-items');
  container.innerHTML = checklistItems.map((item,i) => `
    <div class="check-item ${checks[i]?'checked':''}" onclick="toggleCheck(${i})">
      <div class="checkbox">${checks[i]?'&#10003;':''}</div>
      <span class="check-label">${item}</span>
    </div>`).join('');
  
  const count = checks.filter(Boolean).length;
  const total = checklistItems.length;
  document.getElementById('check-count').textContent = count+'/'+total;
  document.getElementById('check-count').style.color = count===total?'var(--green)':'var(--yellow)';
  const fill = document.getElementById('progress-fill');
  fill.style.width = (count/total*100)+'%';
  fill.className = 'progress-fill' + (count===total?' complete':'');
  document.getElementById('ready-banner').className = 'ready-banner' + (count===total?' show':'');
}

function toggleCheck(i) {
  checks[i] = !checks[i];
  renderChecklist();
}

function resetChecks() {
  checks = new Array(checklistItems.length).fill(false);
  renderChecklist();
}

// ===== BIAS =====
function renderBias() {
  const container = document.getElementById('bias-questions');
  container.innerHTML = biasQs.map((q,i) => `
    <div class="bias-item ${biasAnswers[i]===true?'yes':biasAnswers[i]===false?'no':''}">
      <div class="bias-q">${q}</div>
      <div class="bias-btns">
        <button class="bias-btn ${biasAnswers[i]===true?'yes-active':''}" onclick="setBias(${i},true)">YES</button>
        <button class="bias-btn ${biasAnswers[i]===false?'no-active':''}" onclick="setBias(${i},false)">NO</button>
        <button class="clr-btn" onclick="setBias(${i},null)">CLR</button>
      </div>
    </div>`).join('');

  const bull = biasAnswers.filter(v=>v===true).length;
  const bear = biasAnswers.filter(v=>v===false).length;
  let result, color;
  if(bull>bear){result='BULLISH &#128994;';color='var(--green)'}
  else if(bear>bull){result='BEARISH &#128308;';color='var(--red)'}
  else{result='NEUTRAL &#9898;';color='var(--sub)'}
  document.getElementById('bias-value').innerHTML = result;
  document.getElementById('bias-value').style.color = color;
  document.getElementById('bias-sub').textContent = 'Bull: '+bull+' / Bear: '+bear;
}

function setBias(i, val) {
  biasAnswers[i] = val;
  renderBias();
}

// ===== JOURNAL =====
function logTrade() {
  const pair = document.getElementById('j-pair').value.trim();
  if(!pair) return;
  trades.unshift({
    pair, bias: document.getElementById('j-bias').value,
    rr: document.getElementById('j-rr').value,
    result: document.getElementById('j-result').value,
    notes: document.getElementById('j-notes').value,
    date: new Date().toLocaleDateString()
  });
  document.getElementById('j-pair').value='';
  document.getElementById('j-rr').value='';
  document.getElementById('j-notes').value='';
  renderJournal();
}

function renderJournal() {
  const container = document.getElementById('journal-entries');
  if(!trades.length){container.innerHTML='<div class="no-trades">NO TRADES LOGGED YET</div>';return;}
  container.innerHTML = trades.map(t => `
    <div class="trade-entry ${t.result.toLowerCase()}">
      <div class="trade-left">
        <span class="trade-pair">${t.pair}</span>
        <span class="trade-bias" style="color:${t.bias==='Bullish'?'var(--green)':'var(--red)'}">${t.bias}</span>
        <span class="trade-rr">R:R ${t.rr}</span>
      </div>
      <div class="trade-right">
        <span class="trade-date">${t.date}</span>
        <span class="trade-result ${t.result.toLowerCase()}">${t.result.toUpperCase()}</span>
      </div>
    </div>`).join('');
}

// ===== INIT =====
renderConcepts();
renderPatterns();
renderChecklist();
renderBias();
renderJournal();
</script>
</body>
</html>
