<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ICT Chart</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080c14;font-family:monospace}
.bar{background:#0d1424;border-bottom:1px solid #1e293b;padding:10px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.bar span{color:#00e5ff;font-size:13px;font-weight:bold;letter-spacing:2px}
input,select{background:#080c14;border:1px solid #1e293b;color:#e2e8f0;padding:6px 10px;border-radius:8px;font-family:monospace;font-size:11px}
button{background:#00e5ff20;border:1px solid #00e5ff40;color:#00e5ff;padding:6px 14px;border-radius:8px;cursor:pointer;font-family:monospace;font-size:11px;font-weight:bold}
.syms{padding:8px 10px;background:#0d1424;border-bottom:1px solid #1e293b;display:flex;gap:5px;flex-wrap:wrap}
.s{background:#0d1424;border:1px solid #1e293b;color:#94a3b8;padding:4px 9px;border-radius:6px;cursor:pointer;font-size:9px;font-family:monospace}
#chart{width:100%;height:calc(100vh - 95px)}
</style>
</head>
<body>
<div class="bar">
<span>◈ ICT CHART</span>
<input id="sym" value="NASDAQ:MNQ1!" style="width:140px"/>
<select id="tf">
<option value="1">1m</option>
<option value="5">5m</option>
<option value="15" selected>15m</option>
<option value="60">1H</option>
<option value="240">4H</option>
<option value="D">D</option>
</select>
<button onclick="load()">GO</button>
<a href="index.html" style="color:#475569;font-size:10px;text-decoration:none">← BACK</a>
</div>
<div class="syms">
<button class="s" onclick="go('NASDAQ:MNQ1!')">MNQ</button>
<button class="s" onclick="go('CME_MINI:ES1!')">ES</button>
<button class="s" onclick="go('FX:EURUSD')">EUR/USD</button>
<button class="s" onclick="go('FX:GBPUSD')">GBP/USD</button>
<button class="s" onclick="go('FX:XAUUSD')">GOLD</button>
<button class="s" onclick="go('BINANCE:BTCUSDT')">BTC</button>
<button class="s" onclick="go('FX:US30')">US30</button>
</div>
<div id="chart"></div>
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
function load(){
new TradingView.widget({
container_id:"chart",
symbol:document.getElementById('sym').value,
interval:document.getElementById('tf').value,
theme:"dark",style:"1",locale:"en",
width:"100%",height:"100%",
toolbar_bg:"#0d1424",
overrides:{
"mainSeriesProperties.candleStyle.upColor":"#4ade80",
"mainSeriesProperties.candleStyle.downColor":"#f87171",
"mainSeriesProperties.candleStyle.borderUpColor":"#4ade80",
"mainSeriesProperties.candleStyle.borderDownColor":"#f87171",
"mainSeriesProperties.candleStyle.wickUpColor":"#4ade80",
"mainSeriesProperties.candleStyle.wickDownColor":"#f87171"
}
});}
function go(s){document.getElementById('sym').value=s;load();}
window.onload=load;
</script>
</body>
</html>
